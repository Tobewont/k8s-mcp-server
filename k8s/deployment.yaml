apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp-server
  namespace: default
  labels:
    app: k8s-mcp-server
    version: v1.0.0
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp-server
  template:
    metadata:
      labels:
        app: k8s-mcp-server
        version: v1.0.0
        component: server
    spec:
      containers:
      - name: k8s-mcp-server
        image: k8s-mcp-server:latest  # 替换为实际的镜像地址
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: k8s-mcp-server-config
        # ---- 认证配置（启用多租户时取消注释，同时取消 configmap.yaml 中的认证行） ----
        # env:
        # - name: MCP_JWT_SECRET
        #   valueFrom:
        #     secretKeyRef:
        #       name: k8s-mcp-server-auth
        #       key: MCP_JWT_SECRET
        # - name: MCP_BOOTSTRAP_ADMIN_JWT
        #   valueFrom:
        #     secretKeyRef:
        #       name: k8s-mcp-server-auth
        #       key: MCP_BOOTSTRAP_ADMIN_JWT
        #       optional: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: k8s-mcp-server-data
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
