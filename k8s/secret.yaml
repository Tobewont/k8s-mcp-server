apiVersion: v1
kind: Secret
metadata:
  name: k8s-mcp-server-auth
  namespace: default
  labels:
    app: k8s-mcp-server
    component: auth
type: Opaque
stringData:
  # JWT 签名密钥（必填，请替换为高强度随机字符串）
  MCP_JWT_SECRET: "CHANGE-ME-to-a-strong-random-secret"

  # 管理员 Bootstrap Token（可选，通过 mcp-admin bootstrap 生成后填入）
  # MCP_BOOTSTRAP_ADMIN_JWT: "eyJhbGci..."
