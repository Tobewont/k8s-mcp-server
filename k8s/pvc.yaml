apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-mcp-server-data
  namespace: default
  labels:
    app: k8s-mcp-server
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard  # 可以根据集群调整
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-mcp-server-logs
  namespace: default
  labels:
    app: k8s-mcp-server
    component: logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard  # 可以根据集群调整 