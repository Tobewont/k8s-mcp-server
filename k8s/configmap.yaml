apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-mcp-server-config
  namespace: default
  labels:
    app: k8s-mcp-server
    component: config
data:
  # 服务配置
  SSE_HOST: "0.0.0.0"
  SSE_PORT: "8000"
  
  # 数据目录配置
  DATA_DIR: "/app/data"

  # 备份保留天数（按文件修改时间计算，过期自动清理；0 表示永不清理）
  MCP_BACKUP_RETENTION_DAYS: "90"

  # MCP配置
  MCP_MESSAGE_PATH: "/mcp/k8s-server/message/"
  MCP_SSE_PATH: "/mcp/k8s-server/sse"

  # 日志配置
  LOG_LEVEL: "info"

  # ---- 认证配置（启用多租户时取消注释） ----
  # MCP_AUTH_ENABLED: "true"
  # MCP_JWT_ALGORITHM: "HS256"
  # MCP_JWT_AUDIENCE: "k8s-mcp-server"
  # MCP_TOKEN_MAX_EXPIRY: "7776000"       # 90 天
  # MCP_ADMIN_API_PREFIX: "/admin"
